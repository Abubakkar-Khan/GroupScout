<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090B;
      color: #FAFAFA;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 18px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: white;
      color: black;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #A1A1AA;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #27272A;
      background: #18181B;
      color: white;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #FAFAFA;
    }
    button {
      width: 100%;
      padding: 8px;
      background: white;
      color: black;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #E4E4E7;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
    }
    .success {
      color: #10B981;
    }
    .error {
      color: #EF4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">G</div>
    GroupScout
  </div>
  
  <div class="form-group" style="text-align: center; color: #A1A1AA; font-size: 14px; margin-bottom: 20px;">
    GroupScout is connected to your active browser session automatically.
  </div>

  <div id="statsContainer" style="display: none; background: #18181B; border: 1px solid #27272A; border-radius: 6px; padding: 12px; margin-bottom: 16px;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
      <span style="color: #A1A1AA; font-size: 13px;">Active Keywords:</span>
      <strong id="keywordCount" style="color: #FAFAFA; font-size: 14px;">0</strong>
    </div>
    <div style="display: flex; justify-content: space-between;">
      <span style="color: #A1A1AA; font-size: 13px;">Monitored Groups:</span>
      <strong id="groupCount" style="color: #10B981; font-size: 14px;">0</strong>
    </div>
  </div>
  
  <button id="dashboardBtn">Open Dashboard</button>
  
  <div id="status" class="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
