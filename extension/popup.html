<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090B;
      color: #FAFAFA;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 18px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: white;
      color: black;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #A1A1AA;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #27272A;
      background: #18181B;
      color: white;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #FAFAFA;
    }
    button {
      width: 100%;
      padding: 8px;
      background: white;
      color: black;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #E4E4E7;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
    }
    .success {
      color: #10B981;
    }
    .error {
      color: #EF4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">G</div>
    GroupScout
  </div>
  
  <div class="form-group">
    <label for="userId">User ID</label>
    <input type="text" id="userId" placeholder="Paste your User ID here">
  </div>
  
  <button id="saveBtn">Save & Connect</button>
  
  <div id="status" class="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
